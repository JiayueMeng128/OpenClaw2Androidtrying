name: Build OpenClaw with Artifact Snapshot

on:
  workflow_dispatch:
    inputs:
      use_cached_snapshot:
        description: 'Use cached snapshot from previous run'
        type: boolean
        default: false

jobs:
  # 第一个 Job：上传 snapshot（只在需要时手动触发）
  upload-snapshot:
    runs-on: ubuntu-latest
    if: github.event.inputs.use_cached_snapshot == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Upload snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-snapshot
          path: dist-bin/openclaw-core.snapshot
          retention-days: 90

  # 第二个 Job：使用 snapshot 构建
  build:
    runs-on: ubuntu-latest
    needs: upload-snapshot
    if: always()  # 即使上一个 job 被跳过也运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download snapshot artifact (if available)
        uses: actions/download-artifact@v4
        with:
          name: openclaw-snapshot
          path: dist-bin/
        continue-on-error: true  # 如果没有 artifact，继续执行
        
      - name: Check if snapshot exists
        run: |
          if [ -f "dist-bin/openclaw-core.snapshot" ]; then
            echo "Snapshot found, using it for build"
            ls -lh dist-bin/openclaw-core.snapshot
          else
            echo "No snapshot found, will build from scratch (this will take 2+ hours)"
          fi

      - name: Setup Node.js 22.22.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm build

      - name: Package with nexe
        run: |
          if [ -f "dist-bin/openclaw-core.snapshot" ]; then
            # 使用 snapshot 快速构建
            npx nexe dist/index.js \
              --target linux-x64-22.22.1 \
              --output openclaw-core \
              --snapshot dist-bin/openclaw-core.snapshot \
              --resource "./node_modules/**/*.{js,json,node}" \
              --resource "./package.json" \
              --bundle \
              --temp /tmp/nexe-temp
          else
            # 从零构建（需要 --build）
            npx nexe dist/index.js \
              --target linux-x64-22.22.1 \
              --output openclaw-core \
              --resource "./node_modules/**/*.{js,json,node}" \
              --resource "./package.json" \
              --bundle \
              --build \
              --temp /tmp/nexe-temp
          fi

      - name: Upload final binary
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-core
          path: openclaw-core
