name: Build OpenClaw Simple

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm build

      - name: Package with nexe (full build)
        run: |
          npx nexe dist/index.js \
            --target linux-x64-22 \
            --output openclaw-core \
            --bundle \
            --build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-core
          path: openclaw-core
